# Cross-compilation configuration for Linux musl targets
# Requires: cargo install cargo-zigbuild && rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl

[target.x86_64-unknown-linux-musl]
linker = "rust-lld"

[target.aarch64-unknown-linux-musl]
linker = "rust-lld"

# Aliases for convenience
[alias]
build-linux-x64 = "zigbuild --target x86_64-unknown-linux-musl --release"
build-linux-arm = "zigbuild --target aarch64-unknown-linux-musl --release"
build-all-linux = ["zigbuild", "--target", "x86_64-unknown-linux-musl", "--target", "aarch64-unknown-linux-musl", "--release"]
